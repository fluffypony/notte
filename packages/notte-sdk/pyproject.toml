[project]
name = "notte-sdk"
version = "1.4.4.dev"
description = "The SDK for Notte"
readme = "README.md"
authors = [
    { name = "Notte Team ", email = "hello@notte.cc" }
]
packages = [
  { include = "notte_sdk", from = "src" },
]

requires-python = ">=3.11"
dependencies = [
    "halo>=0.0.28",
    "notte-core @ git+https://github.com/fluffypony/notte.git@main#subdirectory=packages/notte-core",
    "websockets>=13.1",
]

[project.optional-dependencies]
playwright = [
    "playwright~=1.55",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
notte-core = { workspace = true }
