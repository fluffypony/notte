[project]
name = "notte-agent"
version = "1.4.4.dev"
description = "Notte Web AI Agents"
readme = "README.md"
authors = [
    { name = "Notte Team ", email = "hello@notte.cc" }
]
packages = [
  { include = "notte_agent", from = "src" },
]

requires-python = ">=3.11"
dependencies = [
    "notte-core @ git+https://github.com/fluffypony/notte.git@main#subdirectory=packages/notte-core",
    "notte-browser @ git+https://github.com/fluffypony/notte.git@main#subdirectory=packages/notte-browser",
    "notte-llm @ git+https://github.com/fluffypony/notte.git@main#subdirectory=packages/notte-llm",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
notte-core = { workspace = true }
notte-browser = { workspace = true }
notte-llm = { workspace = true }
