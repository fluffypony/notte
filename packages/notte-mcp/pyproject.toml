[project]
name = "notte-mcp"
version = "1.4.4.dev"
description = "The MCP server for Notte"
readme = "README.md"
authors = [
    { name = "Notte Team ", email = "hello@notte.cc" }
]
packages = [
    { include = "notte_mcp", from = "src" },
]


requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.1",
    "mcp[cli]==1.6.0",
    "notte-sdk @ git+https://github.com/fluffypony/notte.git@main#subdirectory=packages/notte-sdk",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
notte-sdk = { workspace = true }
