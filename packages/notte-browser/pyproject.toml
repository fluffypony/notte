[project]
name = "notte-browser"
version = "1.4.4.dev"
description = "The web browser for LLMs agents"
readme = "README.md"
authors = [
    { name = "Notte Team ", email = "hello@notte.cc" }
]
packages = [
  { include = "notte_browser", from = "src" },
]


requires-python = ">=3.11"
dependencies = [
    "notte-core @ git+https://github.com/fluffypony/notte.git@main#subdirectory=packages/notte-core",
    "notte-llm @ git+https://github.com/fluffypony/notte.git@main#subdirectory=packages/notte-llm",
    "maincontentextractor @ git+https://github.com/HawkClaws/main_content_extractor@7c3ed7f6ed7f6c10223a3357d43ab741663bc812",
    "markdownify>=0.14.1",
    "pillow>=11.2.1",
    "patchright~=1.55",
    "tqdm>=4.66.0",
]

[project.optional-dependencies]
camoufox = ["camoufox>=0.4"]
captcha = ["2captcha-python>=1.5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
notte-core = { workspace = true }
notte-llm = { workspace = true }
maincontentextractor = { git = "https://github.com/HawkClaws/main_content_extractor", rev = "7c3ed7f6ed7f6c10223a3357d43ab741663bc812" }
